version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ara_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ara_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ara_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: